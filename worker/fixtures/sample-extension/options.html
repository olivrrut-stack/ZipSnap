<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FocusDash — Options</title>
    <style>
      body {
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        max-width: 520px;
        margin: 40px auto;
        color: #1a1a2e;
      }
      h1 {
        font-size: 22px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0;
        border-bottom: 1px solid #eee;
      }
      label {
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h1>FocusDash — Settings</h1>
    <div class="row">
      <label>Run automatically on page load</label>
      <input type="checkbox" checked />
    </div>
    <div class="row">
      <label>Show desktop notifications</label>
      <input type="checkbox" />
    </div>
    <div class="row">
      <label>Theme</label>
      <select>
        <option>System</option>
        <option>Light</option>
        <option>Dark</option>
      </select>
    </div>
  </body>
</html>
